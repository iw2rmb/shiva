apiVersion: v1
kind: ConfigMap
metadata:
  name: shiva-config
data:
  SHIVA_HTTP_ADDR: ":8080"
  SHIVA_GITLAB_BASE_URL: "https://gitlab.example.com"
  SHIVA_TENANT_KEY: "tenant-a"
  SHIVA_WORKER_CONCURRENCY: "4"
  SHIVA_OPENAPI_PATH_GLOBS: "**/openapi*.{yaml,yml,json},**/swagger*.{yaml,yml,json},**/api/**/*.yaml"
  SHIVA_OPENAPI_REF_MAX_FETCHES: "128"
  SHIVA_OUTBOUND_TIMEOUT_SECONDS: "10"
  SHIVA_INGRESS_BODY_LIMIT_BYTES: "1048576"
  SHIVA_INGRESS_RATE_LIMIT_MAX: "120"
  SHIVA_INGRESS_RATE_LIMIT_WINDOW_SECONDS: "60"
  SHIVA_METRICS_PATH: "/internal/metrics"
  SHIVA_TRACING_ENABLED: "true"
  SHIVA_TRACING_STDOUT: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: shiva-secrets
type: Opaque
stringData:
  SHIVA_DATABASE_URL: "postgres://user:password@postgres:5432/shiva?sslmode=disable"
  SHIVA_GITLAB_TOKEN: ""
  SHIVA_GITLAB_WEBHOOK_SECRET: "replace-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shiva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shiva
  template:
    metadata:
      labels:
        app: shiva
    spec:
      containers:
      - name: shiva
        image: ghcr.io/iw2rmb/shiva:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: shiva-config
        - secretRef:
            name: shiva-secrets
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shiva
spec:
  selector:
    app: shiva
  ports:
  - name: http
    port: 80
    targetPort: http
